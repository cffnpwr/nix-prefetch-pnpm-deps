name: Check version consistency

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "mise.toml"
      - "flake.nix"
      - "flake.lock"

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check-version-consistency:
    name: Check mise.toml and Nix version consistency
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: DeterminateSystems/determinate-nix-action@73327eb48f028efaaf5013656ba216ca3cdeca7b # v3.16.3

      - name: Check version consistency
        run: |
          SYSTEM=$(nix eval --raw --impure --expr 'builtins.currentSystem')
          NIX_PACKAGES=$(nix eval \
            --apply 'shell: map (p: { name = p.pname or p.name; version = p.version; }) shell.buildInputs' \
            --json ".#devShells.${SYSTEM}.default")

          FAILED=0

          while IFS=' = ' read -r tool mise_version; do
            tool="${tool//\"/}"
            tool="${tool// /}"
            mise_version="${mise_version//\"/}"
            mise_version="${mise_version// /}"

            nix_version=$(echo "$NIX_PACKAGES" | jq -r ".[] | select(.name == \"${tool}\") | .version")

            if [ -z "$nix_version" ]; then
              echo "::error::${tool} is in mise.toml but not found in Nix devshell buildInputs"
              FAILED=1
            elif [ "$mise_version" != "$nix_version" ]; then
              echo "::error::${tool} version mismatch: mise.toml=${mise_version}, Nix devshell=${nix_version}"
              FAILED=1
            else
              echo "OK: ${tool} ${mise_version}"
            fi
          done < <(grep -E '^[a-zA-Z0-9_-]+ = "' mise.toml)

          exit $FAILED
