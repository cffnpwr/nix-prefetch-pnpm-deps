name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            nix-system: x86_64-linux
          - runner: ubuntu-24.04-arm
            nix-system: aarch64-linux
          - runner: macos-15
            nix-system: aarch64-darwin
            # Note: DeterminateNix does not work on x86_64-darwin. Use aarch64-darwin with Rosetta 2.
          - runner: macos-15
            nix-system: x86_64-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Setup Nix
        uses: DeterminateSystems/determinate-nix-action@89ab342bd48ff7318caf8d39d6a330c7b1df8f2f # v3.15.2

      - name: Build binaries
        run: |
          nix build .#static --system ${{ matrix.nix-system }}
          mkdir -p dist
          cp result/bin/nix-prefetch-pnpm-deps dist/

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist-${{ matrix.nix-system }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: dist-*

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write

      - name: Create release archives and upload
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION=${TAG_NAME#v}

          # Create archives from each platform's binary
          for artifact_dir in dist-*; do
            system=${artifact_dir#dist-}
            binary="$artifact_dir/nix-prefetch-pnpm-deps"

            if [ ! -f "$binary" ]; then
              echo "Warning: binary not found in $artifact_dir"
              continue
            fi

            archive_name="nix-prefetch-pnpm-deps_${VERSION}_${system}.tar.gz"

            tmpdir=$(mktemp -d)
            cp "$binary" "$tmpdir/"
            cp LICENSE README.md "$tmpdir/" 2>/dev/null || true
            tar -czf "$archive_name" -C "$tmpdir" .
            rm -rf "$tmpdir"
          done

          # Generate checksums
          sha256sum *.tar.gz > checksums.txt

          # Upload assets to the draft release and publish it
          gh release upload "$TAG_NAME" *.tar.gz checksums.txt --clobber
          gh release edit "$TAG_NAME" --draft=false
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
