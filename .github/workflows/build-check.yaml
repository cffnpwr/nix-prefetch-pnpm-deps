name: Build check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  detect-go-mod-changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      go-mod-changed: ${{ steps.filter.outputs.go-mod }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect go.mod/go.sum changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go-mod:
              - 'go.mod'
              - 'go.sum'

  nix-build:
    needs: detect-go-mod-changes
    if: >-
      needs.detect-go-mod-changes.outputs.go-mod-changed == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            nix-system: x86_64-linux
            fix-hashes: true
          - runner: ubuntu-24.04-arm
            nix-system: aarch64-linux
            fix-hashes: false
          - runner: macos-15
            nix-system: aarch64-darwin
            fix-hashes: false
          - runner: macos-15
            nix-system: x86_64-darwin
            fix-hashes: false
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: >-
          matrix.fix-hashes &&
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'renovate')
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.UPDATE_APP_ID }}
          private-key: ${{ secrets.UPDATE_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: DeterminateSystems/determinate-nix-action@1361e7900eb437fb341f0f226e8fbd9a0d8284fa # v3.17.2

      - name: Build with Nix
        id: nix-build
        run: nix build .#static --system ${{ matrix.nix-system }}

      - name: Get GitHub App User ID
        id: get-user-id
        if: >-
          failure() &&
          steps.nix-build.outcome == 'failure' &&
          matrix.fix-hashes &&
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'renovate')
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Fix hash mismatches
        if: >-
          failure() &&
          steps.nix-build.outcome == 'failure' &&
          matrix.fix-hashes &&
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'renovate')
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          USER_ID: ${{ steps.get-user-id.outputs.user-id }}
        run: |
          git stash --include-untracked
          git fetch --depth=1 origin "$GITHUB_HEAD_REF"
          git checkout -B "$GITHUB_HEAD_REF" "${{ github.event.pull_request.head.sha }}"

          determinate-nixd fix hashes --auto-apply

          if ! git diff --quiet; then
            git config user.name "${APP_SLUG}[bot]"
            git config user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
            git add --update --ignore-removal .
            git commit -m "fix(nix): :package: fix Nix vendorHash mismatches"
            git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "$GITHUB_HEAD_REF"
            git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          fi

          git checkout -
          git stash pop || true
